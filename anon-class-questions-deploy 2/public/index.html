<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AskAnon | Anonymous Class Questions</title>
    <meta name="description" content="Anonymous live question board for high school and college classes." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="AskAnon home">
        <span class="brand-mark">?</span>
        <span>AskAnon</span>
      </a>
      <nav class="nav-actions">
        <button class="ghost-button" id="joinTopButton">Join class</button>
        <button class="primary-button" id="createTopButton">Create class</button>
      </nav>
    </header>

    <main id="app" class="app-shell"></main>

    <template id="homeTemplate">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Anonymous classroom Q&A</p>
          <h1>Let students ask the questions they are too embarrassed to raise their hand for.</h1>
          <p class="hero-subtitle">
            Professors create a live board. Students join with a code, submit anonymously, upvote what matters, and see professor answers appear automatically.
          </p>
          <div class="hero-actions">
            <button class="primary-button large" data-action="show-create">Create professor board</button>
            <button class="secondary-button large" data-action="show-join">Join with class code</button>
          </div>
        </div>
        <div class="hero-card" aria-label="Example question board">
          <div class="mini-window-bar">
            <span></span><span></span><span></span>
          </div>
          <div class="sample-question pinned">
            <div class="sample-meta"><span>📌 Exam review</span><strong>18 votes</strong></div>
            <p>Can you explain how the curve will work if the class average changes?</p>
          </div>
          <div class="sample-question">
            <div class="sample-meta"><span>Homework</span><strong>11 votes</strong></div>
            <p>Could we go over problem 7 again before the quiz?</p>
          </div>
          <div class="sample-question answered">
            <div class="sample-meta"><span>Answered</span><strong>8 votes</strong></div>
            <p>Will lecture slides be posted after class?</p>
            <div class="mini-answer">Professor answer: yes, after lecture.</div>
          </div>
        </div>
      </section>

      <section class="feature-row" aria-label="Product features">
        <div><strong>Live refresh</strong><span>Questions update without students reloading.</span></div>
        <div><strong>Moderation</strong><span>Professors can pin, answer, hide, and pause submissions.</span></div>
        <div><strong>Export</strong><span>Download a CSV of class questions after lecture.</span></div>
      </section>

      <section class="split-grid">
        <form class="panel" id="createClassForm">
          <div class="panel-header">
            <p class="eyebrow">For professors</p>
            <h2>Create a class</h2>
          </div>
          <label>
            Class name
            <input name="title" type="text" placeholder="AP Biology Period 3" maxlength="90" required />
          </label>
          <label>
            Course code <span class="optional">optional</span>
            <input name="courseCode" type="text" placeholder="BIO 101" maxlength="32" />
          </label>
          <label>
            School <span class="optional">optional</span>
            <input name="school" type="text" placeholder="Westview High School" maxlength="80" />
          </label>
          <label>
            Professor / teacher name <span class="optional">optional</span>
            <input name="professorName" type="text" placeholder="Dr. Nguyen" maxlength="70" />
          </label>
          <button class="primary-button full" type="submit">Create board</button>
          <p class="helper-text">You will get a private professor link and a public student code.</p>
        </form>

        <form class="panel" id="joinClassForm">
          <div class="panel-header">
            <p class="eyebrow">For students</p>
            <h2>Join a class</h2>
          </div>
          <label>
            Class code
            <input name="joinCode" type="text" placeholder="ABC123" maxlength="6" required />
          </label>
          <button class="secondary-button full" type="submit">Open question board</button>
          <p class="helper-text">No name or account needed. Your question appears anonymously.</p>
        </form>
      </section>
    </template>

    <template id="classTemplate">
      <section class="board-header">
        <div>
          <p class="eyebrow" id="classCodeLabel"></p>
          <h1 id="classTitle"></h1>
          <p class="muted" id="classMeta"></p>
          <p class="live-status" id="classLiveStatus">Live · loading...</p>
        </div>
        <button class="ghost-button" id="copyStudentLinkButton">Copy student link</button>
      </section>

      <section class="board-layout">
        <form class="panel question-form" id="questionForm">
          <div class="panel-header compact">
            <h2>Ask anonymously</h2>
            <p>Keep it specific. Do not include your name unless you want to.</p>
          </div>
          <label>
            Topic <span class="optional">optional</span>
            <select name="tag">
              <option value="">No topic</option>
              <option>Lecture</option>
              <option>Homework</option>
              <option>Exam review</option>
              <option>Project</option>
              <option>Logistics</option>
              <option>Other</option>
            </select>
          </label>
          <label>
            Your question
            <textarea name="body" rows="5" maxlength="600" placeholder="What should we understand about..." required></textarea>
          </label>
          <div class="form-footer">
            <span class="helper-text" id="questionCounter">0/600</span>
          </div>
          <button class="primary-button full" type="submit">Submit question</button>
          <p class="helper-text" id="submissionStatus">Anonymous means this site does not ask for a student name, email, or login.</p>
        </form>

        <section class="questions-panel">
          <div class="questions-toolbar">
            <div>
              <h2>Questions</h2>
              <p class="helper-text">Auto-refresh is on. Use search and filters during class.</p>
            </div>
            <div class="toolbar-actions">
              <input id="questionSearch" class="toolbar-input" type="search" placeholder="Search questions" aria-label="Search questions" />
              <select id="questionFilter" aria-label="Filter questions">
                <option value="all">All</option>
                <option value="open">Open</option>
                <option value="answered">Answered</option>
              </select>
              <select id="questionSort" aria-label="Sort questions">
                <option value="top">Top voted</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
              </select>
              <button class="ghost-button small" id="refreshButton">Refresh</button>
            </div>
          </div>
          <div id="questionsList" class="questions-list"></div>
        </section>
      </section>
    </template>

    <template id="professorTemplate">
      <section class="board-header">
        <div>
          <p class="eyebrow" id="professorCodeLabel"></p>
          <h1 id="professorTitle"></h1>
          <p class="muted" id="professorMeta"></p>
          <p class="live-status" id="professorLiveStatus">Live · loading...</p>
        </div>
        <div class="header-actions">
          <button class="ghost-button" id="copyProfessorLinkButton">Copy professor link</button>
          <button class="secondary-button" id="copyProfessorStudentLinkButton">Copy student link</button>
          <button class="danger-button" id="toggleSubmissionsButton">Pause questions</button>
        </div>
      </section>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="questions-panel professor-panel">
        <div class="questions-toolbar">
          <div>
            <h2>Professor dashboard</h2>
            <p class="helper-text">Pin important questions, write public answers, pause submissions, or export questions after class.</p>
          </div>
          <div class="toolbar-actions">
            <input id="professorSearch" class="toolbar-input" type="search" placeholder="Search dashboard" aria-label="Search dashboard questions" />
            <select id="professorFilter" aria-label="Filter dashboard questions">
              <option value="all">All visible</option>
              <option value="open">Open</option>
              <option value="answered">Answered</option>
              <option value="hidden">Hidden</option>
            </select>
            <select id="professorSort" aria-label="Sort dashboard questions">
              <option value="top">Top voted</option>
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
            </select>
            <button class="ghost-button small" id="professorRefreshButton">Refresh</button>
            <button class="secondary-button small" id="exportCsvButton">Export CSV</button>
          </div>
        </div>
        <div id="professorQuestionsList" class="questions-list"></div>
      </section>
    </template>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
